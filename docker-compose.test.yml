services:
  # Simulated VPS — interactive Ubuntu environment
  vps:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: vps-test
    stdin_open: true
    tty: true
    volumes:
      # Docker socket: lets container manage real Docker containers on host
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist projects between restarts
      - vps_projects:/root/vps-code-bot-projects
    ports:
      - "8888:8080"   # Code-Server
      - "2019:2019"   # Caddy Admin API
      - "3080:80"     # Caddy HTTP (mapped to 3080 to avoid conflicts)
    environment:
      - TERM=xterm-256color

volumes:
  vps_projects:
